name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instal.la el paquet i les eines de dev
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Tipus (mypy, no estricte)
        run: mypy src

      - name: Smoke del CLI
        run: |
          rs485-labtest --version
          rs485-labtest --help

      - name: Tests (unitat + integracio pty)
        run: pytest -v
